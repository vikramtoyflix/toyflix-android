plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace "com.bommalu.toyrentalapp"
    compileSdk 34
    defaultConfig {
        applicationId "com.bommalu.toyrentalapp"
        minSdk 24
        targetSdk 34
        versionCode 108
        versionName "1.2"
    }
    signingConfigs {
        release {
            storeFile file('/Users/vikrama.m/Documents/toy-joy-box-club-main/android/app/upload-keystore.jks')
            storePassword 'toyflix123'
            keyAlias 'upload'
            keyPassword 'toyflix123'
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
